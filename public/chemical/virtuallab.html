    // LOCAL BYPASS: Force dismiss loading spinner after app initializes

      // Poll for Redux store and force-hide loading spinner

        if (dispatched) return;

        // Try to find the Redux store via React DevTools or window
        try {
          // Try finding redux dispatch via React root

        function getHeader() {
          return document.getElementById('header_wrap') ||
            document.querySelector('[class*="header___"]');
        }

        function injectTHSLogo() {
          var header = getHeader();
          if (!header || document.getElementById('ths-logo-inject')) return;
          var logo = document.createElement('div');
          logo.id = 'ths-logo-inject';
          logo.innerHTML = [
            '<img src="https://truonghocsoquocgia.vn/assets/logo/Logomark.svg"',
            '     onerror="this.style.display=\'none\'"',
            '     alt="THS Logo" />',
            '<div class="ths-logo-text">',
            '  <span>TRƯỜNG HỌC SỐ</span>',
            '  <span>QUỐC GIA VIỆT NAM</span>',
            '</div>'
          ].join('');
          header.appendChild(logo);
        }

        setTimeout(injectTHSLogo, 600);
        setTimeout(injectTHSLogo, 2000);
        setTimeout(injectTHSLogo, 4000);
        new MutationObserver(function () {
          if (!document.getElementById('ths-logo-inject')) injectTHSLogo();
        }).observe(document.documentElement, { childList: true, subtree: true });
      })();

      // === LOCAL FIX: THS brand in loading screen ===
      (function () {
        var ID = 'ths-load-brand';
        var overlay = null;

        function inject() {
          if (document.getElementById(ID)) return;
          var root = document.getElementById('root');
          if (!root || !root.firstElementChild) return;
          overlay = root.firstElementChild;

          // Move flask up
          if (!overlay._up) {
            overlay._up = true;
            overlay.style.marginTop = '-40px';
          }

          var el = document.createElement('div');
          el.id = ID;
          el.style.cssText = 'position:fixed;top:72%;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:none;text-align:center;z-index:2147483647';
          el.innerHTML =
            '<img src="https://truonghocsoquocgia.vn/assets/logo/Logomark.svg" onerror="this.style.display=\'none\'" alt="THS" style="height:44px;width:auto;" />' +
            '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">' +
            '<span style="font-size:13px;font-weight:700;color:#fff;letter-spacing:0.4px;font-family:Inter,sans-serif;">TRƯỜNG HỌC SỐ</span>' +
            '<span style="font-size:9.5px;color:rgba(255,255,255,0.5);letter-spacing:1.2px;font-family:Inter,sans-serif;">PHÒNG THÍ NGHIỆM ẢO</span>' +
            '</div>';
          document.body.appendChild(el);
        }

        function remove() {
          var el = document.getElementById(ID);
          if (!el || el._done) return;
          el._done = true;
          el.style.transition = 'opacity 0.4s';
          el.style.opacity = '0';
          setTimeout(function () { el.parentNode && el.parentNode.removeChild(el); }, 450);
        }

        new MutationObserver(function (_, obs) {
          inject();
          // React re-renders overlay with new className when loading finishes
          // OR detect that header is now visible (has height > 0)
          var header = document.querySelector('[class*="header___"]');
          var headerVisible = header && header.offsetHeight > 0;
          var overlayChanged = overlay && overlay._initClass && overlay.className !== overlay._initClass;
          if (overlayChanged || headerVisible) {
            obs.disconnect();
            setTimeout(remove, 4000);
          }
          // Save initial class on first inject
          if (overlay && !overlay._initClass && overlay.className) {
            overlay._initClass = overlay.className;
          }
        }).observe(document.getElementById('root') || document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['class'] });

        setTimeout(remove, 4000);
      })();

      // === LOCAL FIX: Lock document.title + favicon to custom brand ===
      (function () {
        var TITLE = 'THS - Phòng Thí Nghiệm Ảo';
        var FAVICON = 'https://truonghocsoquocgia.vn/assets/logo/Logomark.svg';

        // Force favicon via JS (bypasses browser cache on <link rel="icon">)
        function setFavicon() {
          // Remove all existing favicon links
          document.querySelectorAll('link[rel*="icon"]').forEach(function (el) { el.remove(); });
          // Create new one with cache-busting timestamp
          var link = document.createElement('link');
          link.rel = 'icon';
          link.type = 'image/svg+xml';
          link.href = FAVICON + '?v=' + Date.now();
          document.head.appendChild(link);
        }
        setFavicon();

        // Lock title
        document.title = TITLE;
        var titleEl = document.querySelector('title');
        if (titleEl) {
          new MutationObserver(function () {
            if (document.title !== TITLE) document.title = TITLE;
          }).observe(titleEl, { childList: true, characterData: true, subtree: true });
        }
        setInterval(function () {
          if (document.title !== TITLE) document.title = TITLE;
        }, 2000);
      })();

    })();
  </script>
</body>

</html>
