    // === LOCAL FIX: Auto-add required URL params if missing ===
    (function () {
      var params = new URLSearchParams(window.location.search);
      var changed = false;
      if (!params.has('moduleId')) { params.set('moduleId', '9'); changed = true; }
      if (!params.has('ignoreBlock')) { params.set('ignoreBlock', 'true'); changed = true; }
      if (changed) {
        window.location.replace(window.location.pathname + '?' + params.toString());

    // === LOCAL FIX: Suppress PixiJS TypeError for missing texture .image ===
    window.addEventListener('error', function (event) {
      var msg = event.message || '';
      // Suppress the specific TypeError: Cannot read properties of undefined (reading 'image')
      if (msg.indexOf("reading 'image'") !== -1 || msg.indexOf('reading "image"') !== -1) {
        console.warn('[LOCAL PATCH] Suppressed PixiJS texture error:', msg);
        event.preventDefault();
        event.stopPropagation();
        return true;
      }
    }, true);

    // Also patch PIXI loader resources after page loads
    window.addEventListener('load', function () {
      // Patch PIXI if available - make loader.resources a Proxy that returns safe object for undefined keys
      setTimeout(function () {
        try {
          if (window.PIXI && window.PIXI.Loader) {
            var OrigLoader = window.PIXI.Loader;
            var origShared = OrigLoader.shared;
            if (origShared) {
              var origResources = origShared.resources;
              Object.defineProperty(origShared, 'resources', {
                get: function () {
                  return new Proxy(origResources || {}, {
                    get: function (target, key) {
                      var val = target[key];
                      if (val === undefined) {
                        // Return a safe stub with .image property
                        return { image: new Image(), texture: window.PIXI.Texture.EMPTY, data: null };
                      }
                      return val;
                    }
                  });
                },
                configurable: true
              });
            }
          }
        } catch (e) {
          console.warn('[LOCAL PATCH] Could not patch PIXI:', e);
        }
      }, 2000);
    });

  <script>
    // LOCAL BYPASS: Force dismiss loading spinner after app initializes
    (function () {
      var MAX_WAIT = 15000;
      var start = Date.now();
      var dispatched = false;

      // Override fetch to intercept API calls and return mock data
      var _fetch = window.fetch;
      window.fetch = function (url, opts) {
        var urlStr = (typeof url === 'string' ? url : url.href || url.url || '');
        // Intercept nobook API calls
        if (urlStr.includes('nobook.com') || urlStr.includes('storage-backend') || urlStr.includes('passport.nobook')) {
          var mockResp = { code: 200, data: { isLogin: true, userId: 'local', nickName: 'Local User', isVip: true, token: 'local_token', vipEndTime: '2099-12-31', subjectId: 2, lang: 'vi', content: '', name: 'Untitled', id: 'local_001' }, msg: 'success' };
          return Promise.resolve(new Response(JSON.stringify(mockResp), { status: 200, headers: { 'Content-Type': 'application/json' } }));
        }
        return _fetch.apply(this, arguments);
      };

      // Also intercept XMLHttpRequest
      var _open = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function (method, url) {
        var urlStr = url || '';
        if (typeof urlStr === 'string' && (urlStr.includes('nobook.com') && !urlStr.includes('localhost'))) {
          this._isIntercepted = true;
          this._interceptUrl = urlStr;
        }
        return _open.apply(this, arguments);
      };
      var _send = XMLHttpRequest.prototype.send;
      XMLHttpRequest.prototype.send = function (body) {
        if (this._isIntercepted) {
          var xhr = this;
          setTimeout(function () {
            var mockData = JSON.stringify({ code: 200, data: { isLogin: true, userId: 'local', nickName: 'Local User', isVip: true, token: 'local_token', vipEndTime: '2099-12-31', subjectId: 2, lang: 'vi', content: '', name: 'Untitled', id: 'local_001' }, msg: 'success' });
            Object.defineProperty(xhr, 'readyState', { get: function () { return 4; }, configurable: true });

            Object.defineProperty(xhr, 'responseText', { get: function () { return mockData; }, configurable: true });
            Object.defineProperty(xhr, 'response', { get: function () { return mockData; }, configurable: true });
            xhr.dispatchEvent(new Event('load'));
            if (xhr.onload) xhr.onload();
            if (xhr.onreadystatechange) xhr.onreadystatechange();
          }, 50);
          return;
        }
        return _send.apply(this, arguments);
      };

      // Poll for Redux store and force-hide loading spinner
      function tryDismissSpinner() {
        if (dispatched) return;
        if (Date.now() - start > MAX_WAIT) return;

        // Try to find the Redux store via React DevTools or window
        try {
          // Try finding redux dispatch via React root
          var rootEl = document.getElementById('root');
          if (!rootEl) { setTimeout(tryDismissSpinner, 500); return; }

          // Look for redux store in window
          var store = window.__reduxStore || window.store;
          if (store && store.dispatch) {
            store.dispatch({ type: 'spinModel/show', payload: false });
            store.dispatch({ type: 'chemModel/setLoading', payload: false });
            dispatched = true;
            return;
          }

          // Alternative: find React fiber and dispatch via context
          var fiber = rootEl._reactFiber || rootEl.__reactFiber || rootEl.__reactInternals;
          if (!fiber) {
            // Try finding via key
            var key = Object.keys(rootEl).find(k => k.startsWith('__reactFiber') || k.startsWith('__reactInternalInstance'));
            if (key) fiber = rootEl[key];
          }

          if (fiber) {
            // Traverse fiber tree to find dispatch
            var node = fiber;
            var maxDepth = 200;
            var depth = 0;
            while (node && depth < maxDepth) {
              depth++;
              if (node.memoizedState) {
                var s = node.memoizedState;
                while (s) {
                  if (s.queue && s.queue.dispatch) {
                    // Found a dispatch! Not specific but try anyway
                  }
                  s = s.next;
                }
              }
              if (node.memoizedProps && node.memoizedProps.store && node.memoizedProps.store.dispatch) {
                var d = node.memoizedProps.store.dispatch;
                d({ type: 'spinModel/show', payload: false });
                d({ type: 'spinModel/updateState', payload: { show: false } });
                dispatched = true;
                return;
              }
              node = node.child || node.sibling || (node.return && node.return.sibling);
            }
          }
        } catch (e) {
        }

        setTimeout(tryDismissSpinner, 800);
      }

      // Start trying after a short delay
      setTimeout(tryDismissSpinner, 3000);

      // === LOCAL FIX: Hide specific header buttons (Back, Save, Teaching demo) ===

        setTimeout(hideHeaderButtons, 2500);

      // === LOCAL FIX: Unlock all equipment (remove VIP lock overlays) ===
      (function () {
        function unlockEquipment() {
          // Remove lock icon DOM nodes entirely
          document.querySelectorAll('[data-testid="lock-icon"], .lockWrap___18q_Z, .lock___2rDz_').forEach(function (el) {

            if (parent) {

              parent.style.opacity = '1';

          });
          // Remove any class that indicates "locked" state from equipment items
          document.querySelectorAll('[class*="locked"], [class*="Locked"], [class*="disable"], [class*="Disable"]').forEach(function (el) {
            if (el.querySelector('svg') || el.querySelector('[class*="icon"]')) {
              el.style.pointerEvents = 'auto';
              el.style.opacity = '1';
            }
          });
        }
        // Run periodically and watch DOM

        setTimeout(unlockEquipment, 4000);
        setInterval(unlockEquipment, 3000);
        new MutationObserver(unlockEquipment).observe(document.documentElement, { childList: true, subtree: true });

      // === LOCAL FIX: Lock document.title + favicon to custom brand ===
      (function () {
        var TITLE = 'THS - Phòng Thí Nghiệm Ảo';
        var FAVICON = 'https://truonghocsoquocgia.vn/assets/logo/Logomark.svg';

        // Force favicon via JS (bypasses browser cache on <link rel="icon">)
        function setFavicon() {
          // Remove all existing favicon links
          document.querySelectorAll('link[rel*="icon"]').forEach(function (el) { el.remove(); });
          // Create new one with cache-busting timestamp
          var link = document.createElement('link');
          link.rel = 'icon';
          link.type = 'image/svg+xml';
          link.href = FAVICON + '?v=' + Date.now();
          document.head.appendChild(link);
        }
        setFavicon();

        // Lock title
        document.title = TITLE;
        var titleEl = document.querySelector('title');
        if (titleEl) {
          new MutationObserver(function () {
            if (document.title !== TITLE) document.title = TITLE;
          }).observe(titleEl, { childList: true, characterData: true, subtree: true });
        }
        setInterval(function () {
          if (document.title !== TITLE) document.title = TITLE;
        }, 2000);
      })();

    })();
